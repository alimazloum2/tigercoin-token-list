<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TigerCoin Token List</title>
  <style>
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; max-width: 720px; margin: 40px auto; padding: 0 20px; line-height: 1.5; }
    img { background: repeating-conic-gradient(#eee 0 25%, #fff 0 50%) 50% / 24px 24px; border-radius: 50%; }
    code { background: #f4f4f4; padding: 2px 5px; border-radius: 4px; }
    button { font-size: 16px; padding: 12px 18px; border: 0; border-radius: 8px; background: #f59e0b; color: #111; cursor: pointer; font-weight: 700; }
    button:hover { background: #fbbf24; }
  </style>
</head>
<body>
  <h1>TigerCoin Token List</h1>
  <p><img src="assets/logo.png" alt="TigerCoin logo" width="128" height="128"></p>
  <p><strong>Token:</strong> TigerCoin (<code>TGR</code>) on Base, chain ID <code>8453</code>.</p>
  <p><strong>Contract:</strong> <code>0xa79d3083a7e303Db38e013C54135F178834Ccb1B</code></p>
  <p>
    <button id="add-token">Add TGR to MetaMask</button>
  </p>
  <ul>
    <li><a href="tokenlist.json">tokenlist.json</a></li>
    <li><a href="assets/logo.png">logo.png</a></li>
  </ul>
  <script>
    const BASE_PARAMS = {
      chainId: '0x2105',
      chainName: 'Base',
      nativeCurrency: { name: 'Ether', symbol: 'ETH', decimals: 18 },
      rpcUrls: ['https://mainnet.base.org'],
      blockExplorerUrls: ['https://basescan.org']
    };
    const TOKEN = {
      type: 'ERC20',
      options: {
        address: '0xa79d3083a7e303Db38e013C54135F178834Ccb1B',
        symbol: 'TGR',
        decimals: 18,
        image: 'https://alimazloum2.github.io/tigercoin-token-list/assets/logo.png'
      }
    };
    document.getElementById('add-token').addEventListener('click', async () => {
      if (!window.ethereum) {
        alert('MetaMask was not detected in this browser.');
        return;
      }
      try {
        await window.ethereum.request({ method: 'wallet_switchEthereumChain', params: [{ chainId: BASE_PARAMS.chainId }] });
      } catch (switchError) {
        if (switchError.code === 4902) {
          await window.ethereum.request({ method: 'wallet_addEthereumChain', params: [BASE_PARAMS] });
        } else {
          throw switchError;
        }
      }
      const wasAdded = await window.ethereum.request({ method: 'wallet_watchAsset', params: TOKEN });
      alert(wasAdded ? 'TigerCoin was added to MetaMask.' : 'TigerCoin was not added.');
    });
  </script>
</body>
</html>
